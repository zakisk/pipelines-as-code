---
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: go-testing
  annotations:
    pipelinesascode.tekton.dev/max-keep-runs: "2"
    pipelinesascode.tekton.dev/cancel-in-progress: "true"
    pipelinesascode.tekton.dev/on-event: "pull_request"
    pipelinesascode.tekton.dev/on-target-branch: "[*]"
    pipelinesascode.tekton.dev/on-path-change: "[***/*.go, .tekton/go.yaml]"
spec:
  params:
    - name: repo_url
      value: "{{repo_url}}"
    - name: revision
      value: "{{revision}}"
  pipelineSpec:
    params:
      - name: repo_url
      - name: revision
    tasks:
      - name: go
        taskSpec:
          workspaces:
            - name: source
          steps:
            - name: fetch-repo
              ref:
                resolver: http
                params:
                  - name: url
                    value: https://raw.githubusercontent.com/tektoncd/pipelines-as-code/refs/heads/main/.tekton/stepactions/git-clone.yaml
              params:
                - name: output-path
                  value: $(workspaces.source.path)
                - name: url
                  value: "$(params.repo_url)"
                - name: revision
                  value: "$(params.revision)"
            - name: cache-fetch
              ref:
                resolver: http
                params:
                  - name: url
                    value: https://raw.githubusercontent.com/tektoncd/pipelines-as-code/refs/heads/main/.tekton/tasks/cache-fetch.yaml
              params:
                - name: patterns
                  value: ["**go.mod", "**go.sum"]
                - name: source
                  value: oci://image-registry.openshift-image-registry.svc:5000/$(context.pipelineRun.namespace)/cache-go:{{hash}}
                - name: cachePath
                  value: $(workspaces.source.path)/go-build-cache
                - name: workingdir
                  value: $(workspaces.source.path)
            - name: unittest
              # we get bumped out when usingh the official image with docker.io
              # ratelimit so workaround this.
              image: docker.io/golang:1.26
              env:
                - name: GOCACHE
                  value: $(workspaces.source.path)/go-build-cache/cache
                - name: GOMODCACHE
                  value: $(workspaces.source.path)/go-build-cache/mod
                - name: TESTRR_URL
                  value: "https://testrr.pipelinesascode.com"
                - name: TESTRR_PROJECT
                  value: "pipelinesascode"
                - name: TESTRR_USERNAME
                  value: "pac"
                - name: TESTRR_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: testrr-secret
                      key: password
                      optional: true
                - name: TESTRR_COMMIT_SHA
                  value: "{{revision}}"
                - name: TESTRR_BUILD_ID
                  value: "$(context.pipelineRun.name)"
                - name: TESTRR_RUN_LABEL
                  value: "pac-unit-tests"
                - name: GH_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: "nightly-ci-github-hub-token"
                      key: "hub-token"
              workingDir: $(workspaces.source.path)
              script: |
                #!/usr/bin/env bash
                set -euo pipefail
                git config --global --add safe.directory $(workspaces.source.path)
                ./hack/install-gotestsum.sh 1.13.0 "$(go env GOPATH)/bin"
                test_status=0
                gotestsum --format standard-verbose --jsonfile /tmp/testrr-unit-go.json -- \
                  -coverprofile=coverage.txt -covermode=atomic ./pkg/... || test_status=$?
                if ! ./hack/upload-testrr.sh /tmp/testrr-unit-go.json; then
                  echo "WARNING: testrr upload failed; continuing without failing Tekton"
                fi
                exit "${test_status}"

            - name: coverage
              image: docker.io/golang:1.26
              env:
                - name: CODECOV_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: pipelines-as-code-codecov-token
                      key: token
                - name: GOCACHE
                  value: $(workspaces.source.path)/go-build-cache/cache
                - name: GOMODCACHE
                  value: $(workspaces.source.path)/go-build-cache/mod
                - name: GITHUB_REPOSITORY
                  value: "{{repo_owner}}/{{repo_name}}"
                - name: GITHUB_PULL_REQUEST_ID
                  value: "{{pull_request_number}}"
              workingDir: $(workspaces.source.path)
              script: |
                #!/usr/bin/env bash
                set -eux
                ARCH=aarch64
                git config --global --add safe.directory $(workspaces.source.path)
                git fetch -a --tags
                curl -LOs https://uploader.codecov.io/v0.7.3/aarch64/codecov
                chmod +x ./codecov
                ./codecov -P $GITHUB_PULL_REQUEST_ID -C {{revision}} -v
            - name: lint
              image: docker.io/golangci/golangci-lint:v2.10.1
              workingDir: $(workspaces.source.path)
              env:
                - name: GOCACHE
                  value: $(workspaces.source.path)/go-build-cache/cache
                - name: GOMODCACHE
                  value: $(workspaces.source.path)/go-build-cache/mod
                - name: GOLANGCILINT_CACHE
                  value: $(workspaces.source.path)/go-build-cache/golangci-cache
              script: |
                #!/usr/bin/env bash
                set -eux
                make lint-go
            - name: cache-upload
              ref:
                resolver: http
                params:
                  - name: url
                    value: https://raw.githubusercontent.com/tektoncd/pipelines-as-code/refs/heads/main/.tekton/tasks/cache-upload.yaml
              params:
                - name: patterns
                  value: ["**go.mod", "**go.sum"]
                - name: target
                  value: oci://image-registry.openshift-image-registry.svc:5000/$(context.pipelineRun.namespace)/cache-go:{{hash}}
                - name: fetched
                  value: $(steps.cache-fetch.results.fetched)
                - name: cachePath
                  value: $(workspaces.source.path)/go-build-cache
                - name: workingdir
                  value: $(workspaces.source.path)
                - name: force-cache-upload
                  value: "false"
        workspaces:
          - name: source
            workspace: source
    workspaces:
      - name: source
  workspaces:
    - name: source
      emptyDir: {}
