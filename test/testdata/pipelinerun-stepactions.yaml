---
apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  name: "\\ .PipelineName //"
  annotations:
    pipelinesascode.tekton.dev/target-namespace: "\\ .TargetNamespace //"
    pipelinesascode.tekton.dev/on-target-branch: "[\\ .TargetBranch //]"
    pipelinesascode.tekton.dev/on-event: "[\\ .TargetEvent //]"
spec:
  pipelineSpec:
    tasks:
      - name: stepactions-task
        taskSpec:
          steps:
            - name: fetch-repo-with-stepaction
              ref:
                resolver: hub
                params:
                  - name: catalog
                    value: git-clone-stepaction
                  - name: type
                    value: artifact
                  - name: kind
                    value: stepaction
                  - name: name
                    value: git-clone
                  - name: version
                    value: "1.7.0"
              params:
                - name: output-path
                  value: "/tmp/output"
                - name: url
                  value: "https://github.com/pipelines-as-code/pac-demo"
                - name: revision
                  value: "main"
